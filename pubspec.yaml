name: mentor_mobile_app
description: "A new Fegno Flutter project."

publish_to: "none"

version: 1.0.1+26

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  #* State Management
  bloc: ^9.0.0
  flutter_bloc: ^9.0.0

  #* Network call handling
  dio: ^5.3.3
  internet_connection_checker: ^3.0.1

  #* Data class generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  #* Network image diffrent state handling
  cached_network_image: ^3.3.1

  #* UI
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  flutter_animate: ^4.5.0
  flutter_spinkit: ^5.2.1
  fluttertoast: ^8.2.12
  flutter_svg_provider: ^1.0.7
  syncfusion_flutter_core: ^29.1.38
  syncfusion_flutter_calendar: ^29.1.38
  flutter_pdfview: ^1.4.0+1
  pinput: ^5.0.1
  syncfusion_flutter_sliders: ^29.2.11
  carousel_slider: ^5.1.1
  google_maps_flutter: ^2.12.3
  widget_to_marker: ^1.0.6
  sms_autofill: ^2.4.1

  #* Project deatails
  package_info_plus: ^5.0.1
  shared_preferences: ^2.5.3

  #* Storage
  hydrated_bloc: ^10.0.0
  path: ^1.9.0

  #* Svg support
  flutter_svg: ^2.0.10+1

  #in_app_review: ^2.0.9

  #* Playes
  #fc_native_video_thumbnail: ^0.17.2

  #* Pick files
  file_picker: ^10.1.7
  image_picker: ^1.0.7

  #* Medias
  # record: ^5.0.4

  #* Managing Directories
  path_provider: ^2.1.2
  # audioplayers: ^5.2.1

  #* Notfication
  # awesome_notifications: ^0.9.2
  # awesome_notifications_core: ^0.9.1
  # awesome_notifications_fcm: ^0.9.2

  #*Firebase
  # firebase_core: ^2.27.1
  # firebase_crashlytics: ^3.4.19
  # firebase_messaging: ^14.7.20

  #*Permissions
  permission_handler: ^11.3.0

  #* Functional Programing
  fpdart: ^1.1.0

  #* Core
  feggy_core: ^1.0.15
  dotted_line: ^3.2.3

  #* Convertion
  encrypt: ^5.0.3

  #* Redirectional
  url_launcher: ^6.3.1

  #* App Updating [ Version Management ]
  in_app_update: ^4.2.2
  # firebase_crashlytics: ^3.4.19
  # firebase_analytics: ^10.8.10

  #* Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  change_case: ^2.2.0
  flutter_dotenv: ^5.2.1
  easy_debounce: ^2.0.3

  #* Location
  geolocator: ^14.0.1

  #* Payment
  razorpay_flutter: ^1.4.0
  pretty_dio_logger: ^1.4.0
  image_cropper: ^11.0.0
  crop_image: ^1.0.17

  #* Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.0.0

dependency_overrides:
  web: any
  intl: any
  package_info_plus: any

dev_dependencies:
  #* code generation
  build_runner: ^2.4.13

  #* for freezed data class genearation
  freezed: ^2.5.7
  json_serializable: ^6.9.0

  #* for analyse packages
  very_good_analysis: ^7.0.0

  #* for code formating
  analyzer: ^7.7.1

  #* for native splash
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/images/svg/icons/
    - assets/images/svg/vectors/
    - assets/images/png/icons/
    - assets/images/png/vectors/
    - assets/fonts/
    - assets/debug/

  fonts:
    - family: TitanOne
      fonts:
        - asset: assets/fonts/TitanOne-Regular.ttf
          weight: 100

    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Thin.ttf
          weight: 100

        - asset: assets/fonts/Montserrat-Light.ttf
          weight: 300

        - asset: assets/fonts/Montserrat-Regular.ttf
          weight: 400

        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500

        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600

        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700

        - asset: assets/fonts/Montserrat-ExtraBold.ttf
          weight: 800
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Thin.ttf
          weight: 100

        - asset: assets/fonts/Lato-Light.ttf
          weight: 300

        - asset: assets/fonts/Lato-Regular.ttf
          weight: 400

        - asset: assets/fonts/Lato-Medium.ttf
          weight: 500

        - asset: assets/fonts/Lato-Semibold.ttf
          weight: 600

        - asset: assets/fonts/Lato-Bold.ttf
          weight: 700

        - asset: assets/fonts/Lato-Heavy.ttf
          weight: 800
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Thin.ttf
          weight: 100

        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300

        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400

        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500

        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600

        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
    - family: CustomIcons
      fonts:
        - asset: assets/fonts/Star_filled.ttf
        - asset: assets/fonts/Star_out_black.ttf
